<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Untuk Sayangku ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#ffd6e8,#ffeef5,#fff8fb);
position:relative;
}

/* Background */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=1600&q=80") center/cover;
opacity:.18;
z-index:-2;
}

/* Love */
.heart{
position:absolute;
font-size:30px;
animation:fall linear infinite;
user-select:none;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

.card{
background:rgba(255,255,255,.75);
backdrop-filter:blur(12px);
padding:45px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,105,180,.35);
text-align:center;
max-width:650px;
animation:zoom 1.5s;
}

@keyframes zoom{
from{
transform:scale(.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

h1{
font-family:Pacifico;
font-size:52px;
color:#ff4d88;
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.9;
color:#555;
}

button{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:40px;
background:#ff4d88;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#ff216b;
}

#loveMessage{
margin-top:25px;
font-size:22px;
color:#ff216b;
font-weight:bold;
display:none;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>

</head>
<body>

<div class="card">

<h1>Hiiiii Sayang Akuuuuu ❤️</h1>

<p>
Kalau kamu lagi buka halaman ini...<br><br>

Artinya aku cuma mau bilang kalau... 🥹💖<br><br>

🌸 Makasih udah selalu ada.<br>
🌹 Makasih udah bikin hari-hari aku lebih indah.<br>
💕 Semoga kita selalu bersama yaa.<br><br>

<b>Aku Sayang Banget Sama Kamu ❤️</b>
</p>

<button onclick="showLove()">
Klik Aku 🥰
</button>

<div id="loveMessage">
💖 I LOVE YOU FOREVER 💖
</div>

</div>

<script>

const emoji=["❤️","💖","💕","💗","💞","🌸","🌹","🌺"];

function createHeart(){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML=emoji[Math.floor(Math.random()*emoji.length)];

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
heart.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},9000);

}

setInterval(createHeart,250);

function showLove(){
document.getElementById("loveMessage").style.display="block";
}

</script>

</body>
</html>
